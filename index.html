<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0a0a0f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>CréditoRápido — Cobrador</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--bg2:#12121a;--bg3:#1c1c28;--bg4:#24243a;--card:#16161f;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);--gold:#f0c060;--gold2:#ffd880;--goldd:rgba(240,192,96,0.12);--goldb:rgba(240,192,96,0.25);--green:#50e3a4;--greend:rgba(80,227,164,0.12);--red:#ff6b6b;--redd:rgba(255,107,107,0.12);--amber:#ffaa44;--amberd:rgba(255,170,68,0.12);--blue:#6eb3ff;--blued:rgba(110,179,255,0.12);--text:#f0eeff;--text2:#8880aa;--text3:#55506a;--r:14px;--rs:10px;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'Instrument Sans',sans-serif;font-size:14px;display:flex;flex-direction:column;position:relative;}
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
.app-name{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;color:var(--gold);}
.app-role{font-size:10px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin-top:1px;}
.live-dot{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--green);}
.dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(80,227,164,.5);}50%{box-shadow:0 0 0 5px rgba(80,227,164,0);}}
.tabs{display:flex;gap:8px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto;scrollbar-width:none;padding:8px 10px 0;}
.tabs::-webkit-scrollbar{display:none;}
.tab .ti{opacity:.9;margin-right:4px;font-size:12px;}
.tab{flex:1;min-width:76px;padding:10px 8px;font-size:11px;font-weight:600;color:var(--text3);border:1px solid transparent;background:transparent;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;font-family:'Instrument Sans',sans-serif;white-space:nowrap;border-radius:12px 12px 0 0;}
.tab.active{color:var(--gold);border:1px solid var(--border);border-bottom-color:var(--card);background:var(--card);box-shadow:inset 0 2px 0 0 var(--gold);}
.scroll{flex:1;overflow-y:auto;padding:14px;scrollbar-width:thin;scrollbar-color:var(--bg4) transparent;}
.panel{display:none;}
.panel.active{display:block;animation:fi .2s ease;}
@keyframes fi{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.metric{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;}
.metric.green{border-color:rgba(80,227,164,.25);}
.ml{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px;}
.mv{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;color:var(--text);}
.metric.green .mv{color:var(--green);}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:12px;}
.ct{font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--text3);margin-bottom:12px;}
.fg{margin-bottom:12px;}
.fl{font-size:11px;color:var(--text2);font-weight:500;margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:.04em;}
input,select,textarea{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);color:var(--text);font-family:'Instrument Sans',sans-serif;font-size:14px;padding:10px 12px;outline:none;transition:border .15s;-webkit-appearance:none;}
input:focus,select:focus,textarea:focus{border-color:var(--gold);}
select option{background:var(--bg3);}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:11px 18px;border-radius:var(--rs);font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:'Instrument Sans',sans-serif;transition:all .15s;}
.btn:active{transform:scale(0.97);}
.btn-primary{background:var(--gold);color:#0a0a0f;width:100%;}
.btn-ghost{background:var(--bg3);color:var(--text2);border:1px solid var(--border2);}
.btn-ghost:active{background:var(--bg4);}
.btn-sm{padding:7px 12px;font-size:12px;}
.btn-full{width:100%;}
.notif{position:fixed;top:14px;left:50%;transform:translateX(-50%) translateY(-100px);background:var(--bg2);border:1px solid var(--border2);border-radius:20px;padding:9px 16px;font-size:13px;font-weight:500;color:var(--text);z-index:9999;transition:transform .3s;white-space:nowrap;max-width:92vw;}
.notif.show{transform:translateX(-50%) translateY(0);}
.notif.ok{border-color:rgba(80,227,164,.4);color:var(--green);}
.notif.err{border-color:rgba(255,107,107,.4);color:var(--red);}
.sl{font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--text3);margin:12px 0 7px;}
hr{border:none;border-top:1px solid var(--border);margin:12px 0;}
.empty{text-align:center;padding:32px 16px;color:var(--text3);}
.empty-i{font-size:34px;margin-bottom:8px;}
.empty-t{font-size:13px;color:var(--text2);}
.tabla-cuotas{width:100%;border-collapse:collapse;font-size:12px;margin-top:12px;}
.tabla-cuotas th{background:var(--bg3);color:var(--text2);padding:8px 4px;text-align:left;font-weight:600;border-bottom:1px solid var(--border);}
.tabla-cuotas td{padding:8px 4px;border-bottom:1px solid var(--border);}
.tabla-cuotas tr:hover{background:var(--bg3);}
.preview-box{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);padding:12px;margin:12px 0;}
.preview-title{font-size:11px;color:var(--text2);text-transform:uppercase;margin-bottom:8px;}
.preview-value{font-family:'Syne',sans-serif;font-size:18px;color:var(--gold);font-weight:700;}
.preview-sub{font-size:10px;color:var(--text3);margin-top:4px;}
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="app-name">CréditoRápido</div>
    <div class="app-role">Cobrador</div>
  </div>
  <div class="live-dot" id="status-conexion" style="display:none">
    <span class="dot"></span>
    <span>Conectado</span>
  </div>
</div>

<div class="tabs" id="tabs">
  <button class="tab active" onclick="goTab('clientes',this)"><span class="ti">👥</span>Clientes</button>
  <button class="tab" onclick="goTab('solicitudes',this)"><span class="ti">✦</span>Nueva Solicitud</button>
  <button class="tab" onclick="goTab('simulador',this)"><span class="ti">📊</span>Simular Crédito</button>
</div>

<div class="scroll">
  <!-- PANEL: CLIENTES -->
  <div id="panel-clientes" class="panel active">
    <div id="clientes-list"></div>
  </div>

  <!-- PANEL: SOLICITUD -->
  <div id="panel-solicitudes" class="panel">
    <div style="font-size:12px;color:var(--text3);margin-bottom:12px">Completa esta solicitud para que el admin revise y apruebe.</div>
    
    <div class="card">
      <div class="ct">Datos del Cliente</div>
      <div class="fg"><label class="fl">Nombre</label><input type="text" id="sol-nombre" placeholder="Nombre completo"></div>
      <div class="fr">
        <div class="fg"><label class="fl">Cédula</label><input type="text" id="sol-cedula" placeholder="Ej: 1234567890"></div>
        <div class="fg"><label class="fl">Teléfono</label><input type="text" id="sol-telefono" placeholder="Ej: 3005551234"></div>
      </div>
      <div class="fr">
        <div class="fg"><label class="fl">Negocio</label><input type="text" id="sol-negocio" placeholder="Ej: Tienda"></div>
        <div class="fg"><label class="fl">Zona</label><input type="text" id="sol-zona" placeholder="Ej: Centro"></div>
      </div>
      <div class="fg"><label class="fl">Notas</label><textarea id="sol-notas" placeholder="Observaciones (opcional)"></textarea></div>
    </div>

    <div class="card">
      <div class="ct">Préstamo Solicitado</div>
      <div class="fg"><label class="fl">Monto ($)</label><input type="number" id="sol-monto" placeholder="100000" min="1" oninput="solSimular()"></div>
      <div class="fg"><label class="fl">Frecuencia de pago</label>
        <select id="sol-frecuencia" oninput="solSimular()">
          <option value="diario">Diario</option>
          <option value="semanal">Semanal</option>
          <option value="quincenal">Quincenal</option>
          <option value="mensual">Mensual</option>
        </select>
      </div>
      <div class="fg"><label class="fl">Nº de cuotas</label><input type="number" id="sol-plazo" placeholder="10" min="1" max="365" oninput="solSimular()"></div>
      <div class="fg"><label class="fl">Mora por día ($)</label><input type="number" id="sol-mora" placeholder="5000" min="0" step="1000"></div>
      <div id="sol-preview"></div>
    </div>

    <button class="btn btn-primary" onclick="crearSolicitud()">Enviar Solicitud</button>
  </div>

  <!-- PANEL: SIMULADOR -->
  <div id="panel-simulador" class="panel">
    <div style="font-size:12px;color:var(--text3);margin-bottom:12px">Simula un crédito completando los datos. Verás la tabla de cuotas con fechas de pago.</div>
    
    <div class="card">
      <div class="ct">Parámetros de Simulación</div>
      <div class="fg"><label class="fl">Monto ($)</label><input type="number" id="sim-monto" placeholder="100000" min="1" oninput="simularCredito()"></div>
      <div class="fg"><label class="fl">Frecuencia de pago</label>
        <select id="sim-frecuencia" oninput="simularCredito()">
          <option value="diario">Diario</option>
          <option value="semanal">Semanal</option>
          <option value="quincenal">Quincenal</option>
          <option value="mensual">Mensual</option>
        </select>
      </div>
      <div class="fg"><label class="fl">Nº de cuotas</label><input type="number" id="sim-plazo" placeholder="10" min="1" max="365" oninput="simularCredito()"></div>
      <div class="fg"><label class="fl">Mora por día ($)</label><input type="number" id="sim-mora" placeholder="5000" min="0" step="1000"></div>
    </div>

    <div id="sim-resultado"></div>
  </div>
</div>

<div class="notif" id="notif"></div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js"></script>

<script>
const firebaseConfig={
  apiKey:"AIzaSyA5w-ZH-QVHLCmDLhLJTI-cUl7qXRBxKQ8",
  authDomain:"flotaapp-d3e36.firebaseapp.com",
  databaseURL:"https://flotaapp-default-rtdb.firebaseio.com",
  projectId:"flotaapp-d3e36",
  storageBucket:"flotaapp-d3e36.appspot.com",
  messagingSenderId:"117879619937",
  appId:"1:117879619937:web:94dd04b0e5cc8dc6ad72f8"
};

let db,fbOk=false;
function _arrancar(){
  let retry=0;
  const iv=setInterval(()=>{
    if(window.firebase?.database){
      clearInterval(iv);
      try{
        firebase.initializeApp(firebaseConfig);
        db=firebase.database();
        fbOk=true;
        document.getElementById('status-conexion').style.display='flex';
        cargarClientes();
      }catch(e){console.error(e);}
    }
    if(retry++>20)clearInterval(iv);
  },500);
}
window.onload=_arrancar;

let clientes=[],CONFIG={tasa:20,redondeo:1000,diasCustom:3};

function cargarClientes(){
  if(!fbOk||!db)return;
  db.ref('clientes').on('value',snap=>{
    const data=snap.val();
    clientes=data?Object.values(data):[];
    renderClientes();
  });
  db.ref('config').once('value',snap=>{
    const cfg=snap.val()||{};
    CONFIG={
      tasa:parseFloat(cfg.tasa)||20,
      redondeo:parseInt(cfg.redondeo)||1000,
      diasCustom:parseInt(cfg.diasCustom)||3
    };
  });
}

function renderClientes(){
  const container=document.getElementById('clientes-list');
  if(!clientes.length){container.innerHTML='<div class="empty"><div class="empty-i">👥</div><div class="empty-t">Sin clientes</div></div>';return;}
  container.innerHTML=clientes.map(c=>`
    <div class="card">
      <div style="font-weight:600;margin-bottom:6px;">${c.nombre}</div>
      <div style="font-size:11px;color:var(--text2);">${c.negocio} • ${c.zona}</div>
      <div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border);font-size:12px;">
        <div>Saldo: <strong style="color:var(--green)">${fmt(c.saldo||0)}</strong></div>
        <div>Próxima cuota: <strong>${c.proximaCuota||'-'}</strong></div>
      </div>
    </div>
  `).join('');
}

function goTab(name,el){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('panel-'+name).classList.add('active');
  el.classList.add('active');
}

function notify(msg,type='ok'){
  const n=document.getElementById('notif');
  n.textContent=msg;
  n.className='notif '+type;
  n.classList.add('show');
  setTimeout(()=>n.classList.remove('show'),3000);
}

function fmt(n){
  return new Intl.NumberFormat('es-CO',{style:'currency',currency:'COP',minimumFractionDigits:0}).format(n);
}

const DIAS={diario:1,semanal:7,quincenal:15,mensual:30};

function simularCredito(){
  const monto=parseFloat(document.getElementById('sim-monto').value)||0;
  const frecuencia=document.getElementById('sim-frecuencia').value;
  const plazo=parseInt(document.getElementById('sim-plazo').value)||0;
  const mora=parseFloat(document.getElementById('sim-mora').value)||0;

  if(!monto||!plazo){
    document.getElementById('sim-resultado').innerHTML='';
    return;
  }

  const tasa=CONFIG.tasa;
  const interes=monto*(tasa/100);
  const total=monto+interes;
  const cuotaExacta=total/plazo;
  const redondeo=CONFIG.redondeo;
  const cuota=redondeo>1?Math.ceil(cuotaExacta/redondeo)*redondeo:Math.round(cuotaExacta);
  const cuotaUltima=Math.max(redondeo,total-(cuota*(plazo-1)));

  const diasEntre=DIAS[frecuencia]||1;
  const hoy=new Date();
  hoy.setDate(hoy.getDate()+diasEntre);

  let html=`
    <div class="preview-box">
      <div class="preview-title">Resumen</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;">
        <div>
          <div class="preview-title">Capital</div>
          <div class="preview-value">${fmt(monto)}</div>
        </div>
        <div>
          <div class="preview-title">Intereses (${tasa}%)</div>
          <div class="preview-value">${fmt(interes)}</div>
        </div>
        <div>
          <div class="preview-title">Total a cobrar</div>
          <div class="preview-value" style="color:var(--green)">${fmt(total)}</div>
        </div>
        <div>
          <div class="preview-title">Cuota promedio</div>
          <div class="preview-value">${fmt(cuota)}</div>
        </div>
      </div>
      <div class="preview-sub">📅 ${plazo} cuotas cada ${diasEntre} día${diasEntre>1?'s':''}</div>
    </div>

    <div class="ct" style="margin-top:16px;">Tabla de Cuotas</div>
    <table class="tabla-cuotas">
      <thead><tr><th>#</th><th>Fecha</th><th>Cuota</th><th>Saldo</th></tr></thead>
      <tbody>
  `;

  for(let i=1;i<=plazo;i++){
    const f=new Date(hoy);
    f.setDate(hoy.getDate()+(i-1)*diasEntre);
    const esFinal=i===plazo;
    const cq=esFinal?Math.round(cuotaUltima):cuota;
    const saldo=Math.max(0,total-cuota*(i-1)-cq);
    const fechaStr=f.toLocaleDateString('es-CO',{day:'2-digit',month:'2-digit',year:'numeric'});
    html+=`<tr><td>${i}</td><td>${fechaStr}</td><td>${fmt(cq)}</td><td>${fmt(saldo)}</td></tr>`;
  }

  html+=`</tbody></table>`;
  if(mora>0){
    html+=`<div style="margin-top:12px;padding:8px;background:var(--amberd);border-radius:var(--rs);font-size:11px;color:var(--amber);">ℹ Mora por retraso: ${fmt(mora)}/día</div>`;
  }

  document.getElementById('sim-resultado').innerHTML=html;
}

function solSimular(){
  const monto=parseFloat(document.getElementById('sol-monto').value)||0;
  const frecuencia=document.getElementById('sol-frecuencia').value;
  const plazo=parseInt(document.getElementById('sol-plazo').value)||0;

  if(!monto||!plazo){
    document.getElementById('sol-preview').innerHTML='';
    return;
  }

  const tasa=CONFIG.tasa;
  const interes=monto*(tasa/100);
  const total=monto+interes;
  const cuotaExacta=total/plazo;
  const redondeo=CONFIG.redondeo;
  const cuota=redondeo>1?Math.ceil(cuotaExacta/redondeo)*redondeo:Math.round(cuotaExacta);

  const diasEntre=DIAS[frecuencia]||1;
  const html=`
    <div class="preview-box" style="margin-top:12px;">
      <div class="preview-title">Vista previa</div>
      <div style="font-size:13px;">Total: <strong style="color:var(--gold)">${fmt(total)}</strong></div>
      <div class="preview-sub">Cuota aprox. ${fmt(cuota)} cada ${diasEntre} día${diasEntre>1?'s':''}. ${plazo} cuotas.</div>
    </div>
  `;
  document.getElementById('sol-preview').innerHTML=html;
}

function crearSolicitud(){
  const nombre=document.getElementById('sol-nombre').value.trim();
  const cedula=document.getElementById('sol-cedula').value.trim();
  const telefono=document.getElementById('sol-telefono').value.trim();
  const negocio=document.getElementById('sol-negocio').value.trim();
  const zona=document.getElementById('sol-zona').value.trim();
  const notas=document.getElementById('sol-notas').value.trim();
  const monto=parseFloat(document.getElementById('sol-monto').value)||0;
  const frecuencia=document.getElementById('sol-frecuencia').value;
  const plazo=parseInt(document.getElementById('sol-plazo').value)||0;
  const mora=parseFloat(document.getElementById('sol-mora').value)||0;

  if(!nombre||!monto||!plazo){notify('Completa los campos requeridos','err');return;}

  if(!fbOk||!db){notify('Sin conexión','err');return;}

  const sol={
    id:'sol_'+Date.now(),
    nombre,cedula,telefono,negocio,zona,notas,
    monto,frecuencia,plazo,mora,
    estado:'pendiente',
    ts:Date.now(),
    cobrador:localStorage.getItem('cobrador_name')||'Cobrador'
  };

  db.ref('solicitudes/'+sol.id).set(sol,err=>{
    if(err){notify('Error al enviar','err');return;}
    notify('✓ Solicitud enviada','ok');
    document.getElementById('sol-nombre').value='';
    document.getElementById('sol-cedula').value='';
    document.getElementById('sol-telefono').value='';
    document.getElementById('sol-negocio').value='';
    document.getElementById('sol-zona').value='';
    document.getElementById('sol-notas').value='';
    document.getElementById('sol-monto').value='';
    document.getElementById('sol-plazo').value='';
    document.getElementById('sol-mora').value='';
    document.getElementById('sol-preview').innerHTML='';
  });
}
</script>

</body>
</html>
